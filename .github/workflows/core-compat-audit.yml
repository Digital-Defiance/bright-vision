name: Core compatibility audit

on:
  pull_request:
    paths:
      - 'bright_vision_core/**'
      - 'cecli/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'docs/**'
      - 'package.json'
      - 'pyproject.toml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bright_vision_core + cecli (editable)
        run: |
          python -m pip install -U pip
          pip install -e cecli
          pip install -e '.[dev]'
      - name: workspace path migration tests
        run: python -m pytest tests/core/test_workspace_paths.py -q
